<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>色相辨識測試</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; padding: 16px; background: #fafafa; color: #222; }
  .screen.hidden { display: none; }
  h1 { font-size: 20px; margin-bottom: 12px; }
  label { display: block; margin-bottom: 8px; }
  input[type="text"] { width: 100%; padding: 8px; font-size: 16px; }
  fieldset { margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; }
  .rules { font-size: 13px; color: #666; line-height: 1.6; }
  button { padding: 10px 20px; font-size: 15px; border: none; border-radius: 6px; background: #333; color: #fff; margin-top: 8px; }
  .error-msg { color: #c0392b; font-size: 13px; min-height: 18px; }
  .progress { text-align: center; font-size: 14px; color: #666; margin-bottom: 12px; }
  .tile-row { display: flex; gap: 4px; overflow-x: auto; padding: 12px 4px; background: #f0f0f0; border-radius: 8px; -webkit-overflow-scrolling: touch; }
  .tile { min-width: 44px; height: 64px; border-radius: 6px; flex-shrink: 0; }
  .tile.fixed { border: 3px solid #333; }
  .tile:not(.fixed) { cursor: grab; touch-action: none; user-select: none; }
  .tile.dragging { opacity: 0.6; cursor: grabbing; }
  #result-summary { white-space: pre-line; background: #f0f0f0; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.8; margin-bottom: 12px; }
  #copy-status { font-size: 13px; color: #2e7d32; min-height: 18px; }
</style>
</head>
<body>

<div id="screen-start" class="screen">
  <h1>色相辨識測試</h1>
  <label>姓名
    <input type="text" id="input-name" placeholder="請輸入姓名">
  </label>
  <fieldset>
    <legend>難度</legend>
    <label><input type="radio" name="difficulty" value="normal" checked> 一般</label>
    <label><input type="radio" name="difficulty" value="hard"> 困難</label>
  </fieldset>
  <p class="rules">共 8 關，每關把中間 8 塊色塊依顏色漸層順序拖拉排好，頭尾 2 塊（黑框）固定不動。排完按「下一關」即可繼續，不用排到完全正確才能過關。</p>
  <button id="btn-start">開始測驗</button>
  <p id="start-error" class="error-msg"></p>
</div>

<div id="screen-test" class="screen hidden">
  <div class="progress">第 <span id="level-num">1</span> / 8 關</div>
  <div class="tile-row" id="tile-row"></div>
  <button id="btn-next">下一關</button>
</div>

<div id="screen-result" class="screen hidden">
  <h1>測驗結果</h1>
  <div id="result-summary"></div>
  <button id="btn-copy">複製文字結果</button>
  <p id="copy-status"></p>
  <button id="btn-restart">重新測試</button>
</div>

<script src="logic.js"></script>
<script>
(function () {
  var HT = window.HueTest;

  var state = {
    name: '',
    difficultyKey: 'normal',
    levelIndex: 0,
    levels: [],
    tileErrorGroups: []
  };

  var screenStart = document.getElementById('screen-start');
  var screenTest = document.getElementById('screen-test');
  var screenResult = document.getElementById('screen-result');

  function showScreen(el) {
    [screenStart, screenTest, screenResult].forEach(function (s) {
      s.classList.toggle('hidden', s !== el);
    });
  }

  document.getElementById('btn-start').addEventListener('click', function () {
    var name = document.getElementById('input-name').value.trim();
    if (!name) {
      document.getElementById('start-error').textContent = '請輸入姓名';
      return;
    }
    document.getElementById('start-error').textContent = '';
    var difficulty = document.querySelector('input[name="difficulty"]:checked').value;

    state.name = name;
    state.difficultyKey = difficulty;
    state.levelIndex = 0;
    state.levels = [];
    state.tileErrorGroups = [];
    for (var i = 0; i < HT.LEVEL_COUNT; i++) {
      var correctHues = HT.generateLevelHues(i);
      state.levels.push({ correctHues: correctHues, arrangedHues: HT.shuffleMovable(correctHues) });
    }

    showScreen(screenTest);
    renderLevel();
  });

  function renderLevel() {
    document.getElementById('level-num').textContent = state.levelIndex + 1;
    var btn = document.getElementById('btn-next');
    btn.textContent = state.levelIndex === HT.LEVEL_COUNT - 1 ? '查看結果' : '下一關';

    var level = state.levels[state.levelIndex];
    var diff = HT.DIFFICULTY[state.difficultyKey];
    var row = document.getElementById('tile-row');
    row.innerHTML = '';

    level.arrangedHues.forEach(function (hue, index) {
      var tile = document.createElement('div');
      var isFixed = index === 0 || index === HT.TILES_PER_LEVEL - 1;
      tile.className = 'tile' + (isFixed ? ' fixed' : '');
      tile.style.background = 'hsl(' + hue + ', ' + diff.saturation + '%, ' + diff.lightness + '%)';
      tile.dataset.hue = hue;
      row.appendChild(tile);
    });

    attachDragHandlers(row, level);
  }

  function attachDragHandlers(row, level) {
    var draggingTile = null;

    function getMovableTiles() {
      return Array.prototype.slice.call(row.children, 1, HT.TILES_PER_LEVEL - 1);
    }

    Array.prototype.slice.call(row.children).forEach(function (tile) {
      if (tile.classList.contains('fixed')) return;
      tile.addEventListener('pointerdown', function (evt) {
        draggingTile = tile;
        tile.setPointerCapture(evt.pointerId);
        tile.classList.add('dragging');
      });
    });

    row.addEventListener('pointermove', function (evt) {
      if (!draggingTile) return;
      evt.preventDefault();
      var x = evt.clientX;
      var movable = getMovableTiles();
      for (var i = 0; i < movable.length; i++) {
        if (movable[i] === draggingTile) continue;
        var rect = movable[i].getBoundingClientRect();
        var midpoint = rect.left + rect.width / 2;
        var followsDraggingTile = draggingTile.compareDocumentPosition(movable[i]) & Node.DOCUMENT_POSITION_FOLLOWING;
        var precedesDraggingTile = draggingTile.compareDocumentPosition(movable[i]) & Node.DOCUMENT_POSITION_PRECEDING;
        if (x > midpoint && followsDraggingTile) {
          row.insertBefore(draggingTile, movable[i].nextSibling);
          break;
        }
        if (x < midpoint && precedesDraggingTile) {
          row.insertBefore(draggingTile, movable[i]);
          break;
        }
      }
    });

    function endDrag() {
      if (!draggingTile) return;
      draggingTile.classList.remove('dragging');
      draggingTile = null;
      level.arrangedHues = Array.prototype.slice.call(row.children).map(function (t) {
        return Number(t.dataset.hue);
      });
    }

    row.addEventListener('pointerup', endDrag);
    row.addEventListener('pointercancel', endDrag);
  }

  document.getElementById('btn-next').addEventListener('click', function () {
    var level = state.levels[state.levelIndex];
    var tileErrors = HT.computeTileErrors(level.correctHues, level.arrangedHues);
    state.tileErrorGroups.push(tileErrors);

    if (state.levelIndex < HT.LEVEL_COUNT - 1) {
      state.levelIndex++;
      renderLevel();
    } else {
      showResults();
    }
  });

  function showResults() {
    var totalScore = state.tileErrorGroups.reduce(function (sum, group) {
      return sum + group.reduce(function (s, t) { return s + t.error; }, 0);
    }, 0);
    var zoneErrors = HT.accumulateZoneErrors(state.tileErrorGroups);
    var weakZones = HT.getWeakZones(zoneErrors);
    var grade = HT.gradeScore(totalScore);
    var dateStr = new Date().toLocaleString('zh-TW');

    var resultText = HT.formatResultText({
      name: state.name,
      difficultyLabel: HT.DIFFICULTY[state.difficultyKey].label,
      dateStr: dateStr,
      totalScore: totalScore,
      weakZones: weakZones,
      grade: grade
    });

    var summaryEl = document.getElementById('result-summary');
    summaryEl.textContent = resultText;
    summaryEl.dataset.raw = resultText;
    document.getElementById('copy-status').textContent = '';
    showScreen(screenResult);
  }

  document.getElementById('btn-copy').addEventListener('click', function () {
    var text = document.getElementById('result-summary').dataset.raw;
    var status = document.getElementById('copy-status');
    var textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      status.textContent = '已複製到剪貼簿';
    } catch (e) {
      status.textContent = '複製失敗，請手動選取文字複製';
    }
    document.body.removeChild(textarea);
  });

  document.getElementById('btn-restart').addEventListener('click', function () {
    document.getElementById('input-name').value = '';
    document.getElementById('copy-status').textContent = '';
    showScreen(screenStart);
  });
})();
</script>
</body>
</html>
